# Verticales editoriales del blog montessorimexico.org, agrupadas por autor.
# Cada autor tiene su voz (tone_file) y 5 temas según su especialidad:
#   - Roxana  -> pedagogía Montessori, crianza, humanismo, cuidado e inclusión  (brand: kalpilli)
#   - Caridad -> académico, teórico, filosófico, arte e investigación           (brand: ammac)
#   - Carlos  -> tecnología/IA, economía, interdisciplina y cultura digital     (brand: ammac)
# La rotación reparte las corridas entre todos los temas automáticamente.

topics:
  # ===================== ROXANA MUÑOZ =====================
  - id: montessori_core
    name: Montessori Global (Core)
    author_name: Roxana Muñoz
    tone_file: roxana.md
    brand_kit: kalpilli
    queries:
      - "Montessori education research"
      - "Montessori schools innovation"
      - "método Montessori tendencias"
      - "Montessori classroom practice"
    categories:
      - "Educación Montessori"
      - "Montessori Internacional"
    min_score: 0.65
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza evidencia reciente, estudios y prácticas aplicables en distintos contextos culturales.
      Penaliza contenido comercial genérico y páginas institucionales sin novedad.
    writing_guidelines: >
      Conecta hallazgos globales con aplicaciones prácticas para familias y escuelas de distintos países.

  - id: montessori_en_casa
    name: Montessori en Casa y Crianza Respetuosa
    author_name: Roxana Muñoz
    tone_file: roxana.md
    brand_kit: kalpilli
    queries:
      - "respectful parenting research"
      - "Montessori at home activities"
      - "crianza respetuosa apego evidencia"
      - "autonomía del niño en casa"
    categories:
      - "Montessori en casa"
      - "Desarrollo socioemocional"
    min_score: 0.62
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza contenido aplicable por familias en el hogar: vínculo, límites con respeto,
      independencia y vida cotidiana. Penaliza consejos sin sustento o de tono comercial.
    writing_guidelines: >
      Habla a madres, padres y cuidadores con calidez y firmeza; cada consejo práctico
      anclado en el porqué pedagógico, siempre con el niño como centro.

  - id: montessori_ambiente
    name: Ambiente Preparado y Formación de Guías
    author_name: Roxana Muñoz
    tone_file: roxana.md
    brand_kit: kalpilli
    queries:
      - "Montessori prepared environment"
      - "Montessori materials practical life"
      - "observación del niño Montessori"
      - "formación guía Montessori"
    categories:
      - "Ambiente Montessori"
      - "Formación Montessori"
    min_score: 0.62
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza el ambiente preparado, los materiales, la observación y la formación de la Guía.
      Penaliza contenido decorativo sin fundamento pedagógico.
    writing_guidelines: >
      Explica el sentido profundo del ambiente y la observación; vincula belleza y orden
      con la independencia y el trabajo interior del niño.

  - id: educacion_humanista
    name: Educación Humanista y Desarrollo Socioemocional
    author_name: Roxana Muñoz
    tone_file: roxana.md
    brand_kit: kalpilli
    queries:
      - "humanistic education classroom"
      - "social emotional learning evidence schools"
      - "educación humanista escuela"
      - "autonomía estudiantil bienestar escolar"
    categories:
      - "Educación humanista"
      - "Desarrollo socioemocional"
    min_score: 0.62
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza evidencia sobre autonomía, clima de aula, motivación intrínseca y bienestar.
      Evita enfoques pseudocientíficos o afirmaciones sin sustento.
    writing_guidelines: >
      Aborda el bienestar y lo socioemocional con calidez y firmeza; conecta cada práctica
      con el respeto al niño y su desarrollo integral.

  - id: inclusion_diversidad
    name: Educación Inclusiva y Diversidad
    author_name: Roxana Muñoz
    tone_file: roxana.md
    brand_kit: kalpilli
    queries:
      - "inclusive education research"
      - "neurodiversity classroom support"
      - "educación inclusiva evidencia"
      - "estrategias TDAH aula"
    categories:
      - "Inclusión"
      - "TDAH"
    min_score: 0.6
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza prácticas inclusivas con evidencia: neurodiversidad, accesibilidad y atención
      a la diferencia. Penaliza enfoques estigmatizantes o sin fundamento.
    writing_guidelines: >
      Defiende que el método llegue a todos los niños; vincula la inclusión con la observación,
      el respeto al ritmo propio y el cuidado de cada niño como único.

  # ===================== CARIDAD ROMERO MUÑOZ =====================
  - id: constructivismo
    name: Constructivismo y Aprendizaje Activo
    author_name: Caridad Roxana Romero Muñoz
    tone_file: caridad.md
    brand_kit: ammac
    queries:
      - "constructivist education research"
      - "Vygotsky scaffolding classroom"
      - "aprendizaje activo aula evidencia"
      - "Piaget classroom practice"
    categories:
      - "Constructivismo"
      - "Aprendizaje activo"
    min_score: 0.62
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza hallazgos verificables sobre diseño de aprendizaje activo,
      andamiaje, evaluación formativa y transferencia al aula.
    writing_guidelines: >
      Explica con rigor la teoría detrás de la práctica; distingue el concepto de sus usos
      vulgarizados y ancla los argumentos en autores (Piaget, Vygotsky, Bruner).

  - id: filosofia_educacion
    name: Filosofía y Teoría de la Educación
    author_name: Caridad Roxana Romero Muñoz
    tone_file: caridad.md
    brand_kit: ammac
    queries:
      - "philosophy of education research"
      - "epistemology of learning theory"
      - "filosofía de la educación contemporánea"
      - "teorías del conocimiento aprendizaje"
    categories:
      - "Filosofía de la educación"
      - "Educación"
    min_score: 0.6
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza pensamiento educativo riguroso: epistemología del aula, teorías del conocimiento,
      pedagogía crítica y debates conceptuales. Penaliza opinión superficial o autoayuda.
    writing_guidelines: >
      Sitúa cada idea en su tradición teórica; desarrolla el argumento por etapas y cierra
      con una pregunta o confrontación que prolongue la reflexión del lector.

  - id: arte_educacion
    name: Arte, Estética y Aprendizaje
    author_name: Caridad Roxana Romero Muñoz
    tone_file: caridad.md
    brand_kit: ammac
    queries:
      - "arts education research evidence"
      - "aesthetic education learning"
      - "museum education children"
      - "educación artística desarrollo infantil"
    categories:
      - "Arte y educación"
      - "Música"
    min_score: 0.6
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza la relación entre arte, estética, cultura visual y aprendizaje, con mirada
      curatorial y fundamento. Penaliza manualidades sin marco conceptual.
    writing_guidelines: >
      Aporta la perspectiva de la curaduría y la historia del arte; conecta lo estético con
      lo cognitivo y lo formativo, con prosa cuidada y precisa.

  - id: historia_pedagogia
    name: Historia de la Educación y Grandes Pensadores
    author_name: Caridad Roxana Romero Muñoz
    tone_file: caridad.md
    brand_kit: ammac
    queries:
      - "history of pedagogy thinkers"
      - "Dewey Freire educational thought"
      - "historia de la educación pensadores"
      - "pedagogos clásicos influencia actual"
    categories:
      - "Historia de la educación"
      - "Educación"
    min_score: 0.6
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza el pensamiento de pedagogos y su vigencia, con rigor histórico y conceptual.
      Penaliza biografías superficiales o efemérides sin análisis.
    writing_guidelines: >
      Sitúa a cada pensador en su contexto y tradición; muestra la genealogía de las ideas
      y por qué siguen interpelándonos, cerrando con una pregunta abierta.

  - id: investigacion_educativa
    name: Investigación y Evidencia Educativa
    author_name: Caridad Roxana Romero Muñoz
    tone_file: caridad.md
    brand_kit: ammac
    queries:
      - "education research methodology"
      - "learning sciences evidence"
      - "neurociencia del aprendizaje evidencia"
      - "investigación educativa metodología"
    categories:
      - "Investigación educativa"
      - "Educación de calidad"
    min_score: 0.62
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza estudios sólidos, metodología y lectura crítica de la evidencia.
      Penaliza neuromitos, divulgación tergiversada y conclusiones sin sustento.
    writing_guidelines: >
      Examina la evidencia con rigor: qué muestra, qué no, y qué cautelas exige; distingue
      el hallazgo del titular, con distancia analítica serena.

  # ===================== CARLOS ROMERO MUÑOZ =====================
  - id: tecnologia_educacion
    name: Tecnología, IA y Aprendizaje
    author_name: Carlos Alfonso Romero
    tone_file: carlos.md
    brand_kit: ammac
    queries:
      - "artificial intelligence in education research"
      - "edtech evidence classroom"
      - "inteligencia artificial educación infancia"
      - "tecnología y aprendizaje escuela"
    categories:
      - "Tecnología educativa"
      - "Inteligencia Artificial"
    min_score: 0.6
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza análisis sustentado sobre IA y tecnología en educación, con mirada crítica.
      Penaliza promoción de productos, hype sin evidencia y tecnoutopías.
    writing_guidelines: >
      Examina la tecnología con ojo crítico y analógico; tiende puentes entre disciplinas
      (educación, filosofía, economía) y subordina siempre la herramienta al niño y al sentido.

  - id: economia_educacion
    name: Economía, Finanzas e Interdisciplina Educativa
    author_name: Carlos Alfonso Romero
    tone_file: carlos.md
    brand_kit: ammac
    queries:
      - "economics of education research"
      - "financial literacy children schools"
      - "economía de la educación evidencia"
      - "educación financiera infancia"
    categories:
      - "Economía de la educación"
      - "Educación de calidad"
    min_score: 0.6
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza evidencia sobre economía de la educación, financiamiento, educación financiera
      y costo-beneficio formativo. Penaliza ideología sin datos y contenido de venta.
    writing_guidelines: >
      Conecta economía y finanzas con el sentido educativo; usa analogías entre campos para
      iluminar, no para impresionar, y aterriza en lo aplicable a familias y escuelas.

  - id: interdisciplina
    name: "Interdisciplina: Ciencia, Arte y Pensamiento"
    author_name: Carlos Alfonso Romero
    tone_file: carlos.md
    brand_kit: ammac
    queries:
      - "interdisciplinary learning research"
      - "STEAM education evidence"
      - "pensamiento interdisciplinario educación"
      - "conexiones entre ciencia arte aprendizaje"
    categories:
      - "Educación"
      - "Inteligencia"
    min_score: 0.6
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza enfoques que cruzan disciplinas (ciencia, arte, tecnología, humanidades) con
      sustento. Penaliza mezclas vistosas sin rigor ni aplicación.
    writing_guidelines: >
      Es tu terreno: enlaza campos aparentemente distantes para producir comprensión; cada
      analogía debe ser un puente cognitivo real, no un adorno, y aterrizar en lo educativo.

  - id: futuro_trabajo
    name: Futuro del Trabajo y Habilidades del Siglo XXI
    author_name: Carlos Alfonso Romero
    tone_file: carlos.md
    brand_kit: ammac
    queries:
      - "future of work skills education"
      - "21st century skills evidence"
      - "habilidades del futuro educación"
      - "automatización empleo formación"
    categories:
      - "Educación de calidad"
      - "Tecnología educativa"
    min_score: 0.6
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza prospectiva fundamentada sobre habilidades, automatización y empleo, con lectura
      crítica. Penaliza listas de "skills" sin evidencia y futurología vacía.
    writing_guidelines: >
      Conecta economía, tecnología y desarrollo humano; cuestiona modas con ironía precisa
      y devuelve la mirada al niño y a lo que de verdad forma para el futuro.

  - id: cultura_digital
    name: Cultura Digital, Medios y Pensamiento Crítico
    author_name: Carlos Alfonso Romero
    tone_file: carlos.md
    brand_kit: ammac
    queries:
      - "media literacy research children"
      - "screen time attention learning"
      - "alfabetización mediática infancia"
      - "pensamiento crítico medios digitales"
    categories:
      - "Cultura digital"
      - "Tecnología educativa"
    min_score: 0.6
    post_template: post_prompt.txt
    scoring_guidelines: >
      Prioriza análisis sobre medios, atención, pantallas y alfabetización mediática con
      evidencia. Penaliza pánico moral y también el optimismo tecnológico ingenuo.
    writing_guidelines: >
      Mira la cultura digital con filo crítico y analógico; ni demonizar ni idealizar la
      pantalla, sino pensar qué le hace a la atención y al criterio del niño.
